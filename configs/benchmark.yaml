backends:
  - name: mlx-lm
    models:
      - mlx-community/Llama-3.2-3B-Instruct-4bit
      - mlx-community/Qwen2.5-7B-Instruct-4bit

  - name: ollama
    models:
      - llama3.2:3b
      - qwen2.5:7b

prompts:
  - builtin: short_qa
  - builtin: code_completion

settings:
  max_tokens: 512
  runs_per_config: 3
  warmup_runs: 1
  cool_down_seconds: 5.0
